# Top-level defaults. Only the keys read by scripts/train.py live here:
#
#   defaults.dataset / defaults.model / defaults.training  -- route to the
#       configs/<group>/<name>.yaml file that holds the actual settings.
#   seed                                                   -- default seed
#                                                             (CLI --seed wins)
#   deterministic                                          -- enable
#       torch.use_deterministic_algorithms(True, warn_only=True)
#
# All other knobs (epochs, batch_size, log_every, val_every, save_every, ...)
# live in configs/training/<name>.yaml because they are training-time concerns.
#
# Example override:
#   python scripts/train.py --dataset pavia_university --training label_5

defaults:
  dataset: indian_pines
  model: dr_gsmamba
  training: default

seed: 0
deterministic: true
