# Default model configuration for the full CFA-GDRO model (backbone + EPH).
# Every key under op_s4 / spatial_stem / cp_graph / evidential_head is wired
# into CFAGDRO.from_config (no decorative knobs); ablations toggle these
# directly. Architectural choices ablated in Phase 7: roadmap M7.3.

name: cfa_gdro
feature_dim: 128   # output dim of the fusion module that the EPH consumes
use_cp_graph: true # toggle the CP-Graph refinement layer

# Spectral encoder: OP-S4. Operates on raw bands, not on PCA components.
op_s4:
  hidden_dim: 64
  state_dim: 16
  num_layers: 2
  bidirectional: true
  hippo_init: true              # HiPPO-LegS log-spaced timescale init
  band_importance_gating: true  # learned per-band scalar gate

# Spatial stem: compact 2-D CNN on PCA patches.
spatial_stem:
  base_channels: 32   # block 1 width; block 2 has 2 * base_channels
  norm_type: gn       # 'gn' (default, decision D-09) or 'bn'
  dropout: 0.0        # dropout after global average pooling

# Cross-Pixel Affinity Graph (design choice; see docs/math/cp_graph.md).
cp_graph:
  k: 8
  tau_g: 1.0              # graph temperature (separate from EPH temperature)
  stop_grad_target: true  # BYOL-style stop-grad on tilde_p (math note §4)

# Evidential Prototype Head (contribution; see docs/math/evidential_prototype_head.md).
evidential_head:
  tau_init: 5.0
  tau_min: 1.0
  tau_max: 30.0
  prototype_init_scale: 0.02
