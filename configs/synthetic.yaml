project: DR-GSMamba
dataset:
  name: synthetic
  root: ./data
  data_key: null
  gt_key: null
  pca_components: 32
  patch_size: 9
  train_ratio: 0.05
  val_ratio: 0.05
  samples_per_class: 40
  synthetic:
    height: 80
    width: 80
    bands: 64
    classes: 8
training:
  seeds: [0, 1, 2]
  epochs: 3
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  device: auto
  num_workers: 0
model:
  spectral_dim: 32
  hidden_dim: 96
  graph_nodes: 81
  depth: 3
  spectral_backend: mamba
  spectral_heads: 4
  use_spectral: true
  use_graph: true
  use_prototype: true
loss:
  robust_alpha: 0.3
  risk_ema_momentum: 0.9
  robust_weight: 0.3
  prototype_weight: 0.1
  prototype_supervised_weight: 0.05
  uncertainty_weight: 0.05
  graph_smooth_weight: 0.02
outputs:
  dir: outputs/synthetic
