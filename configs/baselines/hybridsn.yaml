# HybridSN baseline (Roy et al. 2020 GRSL).
name: hybridsn
family: deep
model:
  dropout: 0.4
training:
  epochs: 200
  batch_size: 64
  optimizer:
    name: adamw
    lr: 5.0e-4
    weight_decay: 1.0e-4
    betas: [0.9, 0.999]
  scheduler:
    name: cosine
    warmup_epochs: 5
    min_lr: 1.0e-5
  grad_clip: 1.0
  val_every: 1
  save_every: 50
  log_every: 50
